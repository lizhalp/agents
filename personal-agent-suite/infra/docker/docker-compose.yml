name: personal-agent-suite

services:
  reverse-proxy:
    image: caddy:2.9.1-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    env_file:
      - ../../.env
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - platform

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:${API_PORT}
      PORT: ${WEB_PORT}
      AUTH_URL: https://${PUBLIC_BASE_URL}
      AUTH_TRUST_HOST: "true"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - platform

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      TEMPORAL_HOST: temporal
      MINIO_HOST: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - platform

  orchestrator:
    build:
      context: ../..
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      TEMPORAL_HOST: temporal
    depends_on:
      temporal:
        condition: service_started
    networks:
      - platform

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - platform

  temporal:
    image: temporalio/auto-setup:1.27.2
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: https://${PUBLIC_BASE_URL}
    depends_on:
      temporal:
        condition: service_started
    networks:
      - platform

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    env_file:
      - ../../.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - platform

  prometheus:
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - platform

  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - platform

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    networks:
      - platform

  grafana:
    image: grafana/grafana:12.0.1
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${PUBLIC_BASE_URL}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
