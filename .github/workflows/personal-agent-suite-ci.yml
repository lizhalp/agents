name: Personal Agent Suite CI

"on":
  push:
    paths:
      - "personal-agent-suite/**"
      - ".github/workflows/personal-agent-suite-ci.yml"
  pull_request:
    paths:
      - "personal-agent-suite/**"
      - ".github/workflows/personal-agent-suite-ci.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api-integration: ${{ steps.filter.outputs.api-integration }}
      compose-config: ${{ steps.filter.outputs.compose-config }}
      stack-e2e: ${{ steps.filter.outputs.stack-e2e }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-integration:
              - ".github/workflows/personal-agent-suite-ci.yml"
              - "personal-agent-suite/apps/api/**"
              - "personal-agent-suite/packages/config/**"
              - "personal-agent-suite/packages/shared-types/**"
              - "personal-agent-suite/package.json"
              - "personal-agent-suite/pnpm-lock.yaml"
              - "personal-agent-suite/turbo.json"
              - "personal-agent-suite/vitest.config.ts"
            compose-config:
              - ".github/workflows/personal-agent-suite-ci.yml"
              - "personal-agent-suite/.env.example"
              - "personal-agent-suite/infra/docker/**"
            stack-e2e:
              - ".github/workflows/personal-agent-suite-ci.yml"
              - "personal-agent-suite/apps/api/**"
              - "personal-agent-suite/apps/web/**"
              - "personal-agent-suite/infra/docker/**"
              - "personal-agent-suite/packages/config/**"
              - "personal-agent-suite/packages/shared-types/**"
              - "personal-agent-suite/playwright.config.ts"
              - "personal-agent-suite/pnpm-lock.yaml"
              - "personal-agent-suite/services/orchestrator/**"
              - "personal-agent-suite/tests/e2e/**"

  fast-checks:
    name: Fast checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: personal-agent-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: personal-agent-suite/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  compose-config:
    name: Compose config
    runs-on: ubuntu-latest
    needs:
      - changes
      - fast-checks
    if: needs.changes.outputs.compose-config == 'true' || needs.changes.outputs.stack-e2e == 'true'
    defaults:
      run:
        working-directory: personal-agent-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate Compose config
        run: docker compose --env-file .env -f infra/docker/docker-compose.yml config >/tmp/personal-agent-suite-compose.yaml

  api-integration:
    name: API integration
    runs-on: ubuntu-latest
    needs:
      - changes
      - fast-checks
    if: needs.changes.outputs.api-integration == 'true'
    defaults:
      run:
        working-directory: personal-agent-suite

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agent_suite_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_suite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: personal-agent-suite/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API integration tests
        env:
          INTERNAL_API_SECRET: test-secret
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: agent_suite_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: pnpm --filter @agent-suite/api test:integration

  stack-e2e:
    name: Stack E2E
    runs-on: ubuntu-latest
    needs:
      - changes
      - compose-config
      - fast-checks
    if: needs.changes.outputs.stack-e2e == 'true'
    defaults:
      run:
        working-directory: personal-agent-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: personal-agent-suite/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build images
        run: docker compose --env-file .env -f infra/docker/docker-compose.yml build web api orchestrator

      - name: Start stack
        run: |
          docker compose --env-file .env -f infra/docker/docker-compose.yml up -d || {
            docker compose --env-file .env -f infra/docker/docker-compose.yml ps -a
            docker compose --env-file .env -f infra/docker/docker-compose.yml logs --tail=200
            exit 1
          }

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env -f infra/docker/docker-compose.yml ps
          docker compose --env-file .env -f infra/docker/docker-compose.yml logs api reverse-proxy web temporal orchestrator
          exit 1

      - name: Assert readiness and status
        run: |
          curl -fsS http://localhost/health/live
          curl -fsS http://localhost/health/ready
          curl -fsS -H "x-internal-api-secret: change-me-in-real-environments" http://localhost/api/status

      - name: Assert anonymous API is denied
        run: |
          status=$(curl -ks -o /dev/null -w "%{http_code}" https://localhost/api/status)
          test "$status" = "401"

      - name: Assert Temporal smoke path
        run: |
          curl -fsS -X POST -H "x-internal-api-secret: change-me-in-real-environments" http://localhost/api/smoke/temporal

      - name: Run Playwright E2E tests
        run: pnpm test:e2e

      - name: Assert frontend renders over HTTPS
        run: |
          curl -ksSf https://localhost/ | grep -q "Personal Agent Suite"

      - name: Dump service status on failure
        if: failure()
        run: |
          docker compose --env-file .env -f infra/docker/docker-compose.yml ps
          docker compose --env-file .env -f infra/docker/docker-compose.yml logs --tail=200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: personal-agent-suite/playwright-report
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: docker compose --env-file .env -f infra/docker/docker-compose.yml down -v
